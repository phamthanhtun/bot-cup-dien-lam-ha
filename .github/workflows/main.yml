name: Quet_Lich_Lam_Ha

on:
  schedule:
    - cron: '0 0 * * *' # 7h sáng VN
  workflow_dispatch: 

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install lib
        run: |
          pip install pandas playwright beautifulsoup4 requests
          playwright install chromium --with-deps

      - name: Run script
        run: python main.py
