name: Quet_Lich_Lam_Ha
on:
  schedule:
    - cron: '0 0 * * *' # Đúng 7h sáng VN nó tự thức dậy quét
  workflow_dispatch: # Tạo cái nút để đại ca tự bấm chạy thử bất cứ lúc nào

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install lib
        run: |
          pip install requests beautifulsoup4 playwright selenium webdriver-manager
          playwright install chromium --with-deps

      - name: Run script
        run: python main.py
