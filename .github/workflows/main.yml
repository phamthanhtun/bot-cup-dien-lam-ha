name: EVN Lam Ha Bot

on:
  schedule:
    # Chạy vào 7h sáng mỗi ngày (Giờ UTC là 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # Cho phép đại ca bấm nút chạy tay bất cứ lúc nào

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas openpyxl requests
          playwright install chromium

      - name: Run Bot
        run: python main.py
