name: Quet_Lich_Lam_Ha
on:
  workflow_dispatch: # Để sếp bấm nút chạy tay cho sướng
  schedule:
    - cron: '0 0 * * *' # Tự chạy lúc 7h sáng VN

jobs:
  run_bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install lib
        run: |
          pip install pandas playwright beautifulsoup4
          playwright install chromium --with-deps
      - name: Run script
        run: python main.py
